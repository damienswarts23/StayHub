  <main class="main-area">

    <section class="topbar">
      <h1>Add Accommodation</h1>
      <p>Create a new accommodation listing and add room information for guests.</p>
    </section>

    <section class="form-panel">
      <div class="panel-title">
        <small>New Listing</small>
        <h2>Accommodation Details</h2>
      </div>

      <form action="add_accommodation.php" method="POST">

        <div class="form-section">

          <label for="name">Accommodation Name</label>
          <input type="text" name="name" id="name" required>

          <label for="address">Address</label>
          <input type="text" name="address" id="address" required>

          <label for="contact_num">Contact Number</label>
          <input type="text" name="contact_num" id="contact_num" required>

          <label for="amenities">Amenities</label>
          <textarea name="amenities" id="amenities" rows="4" required></textarea>
        </div>

        <div class="form-section">
          <h3>Room Information</h3>

          <div id="rooms-container">
            <div class="room-card">
              <div class="room-grid">
                <div>
                  <label>Room Type</label>
                  <input type="text" name="rm_type[]" required>
                </div>

                <div>
                  <label>Total Rooms</label>
                  <input type="number" name="tot_rms[]" required min="1">
                </div>

                <div>
                  <label>Price per Room</label>
                  <input type="number" name="price[]" required step="0.01">
                </div>
              </div>

              <button class="remove-btn" type="button" onclick="removeRoom(this)">Remove</button>
            </div>
          </div>

          <button class="add-btn" type="button" onclick="addRoom()">Add Another Room</button>
        </div>

        <button class="save-btn" type="submit">Save Accommodation</button>

      </form>
    </section>

    <p class="footer-text">© 2025 STAY HUB. All rights reserved.</p>

<script>
  function addRoom() {
    const container = document.getElementById("rooms-container");

    const block = document.createElement("div");

    block.className = "room-card";

    block.innerHTML = `
      <div class="room-grid">
        <div>
          <label>Room Type</label>
          <input type="text" name="rm_type[]" required>
        </div>

        <div>
          <label>Total Rooms</label>
          <input type="number" name="tot_rms[]" required min="1">
        </div>

        <div>
          <label>Price per Room</label>
          <input type="number" name="price[]" required step="0.01">
        </div>
      </div>

      <button class="remove-btn" type="button" onclick="removeRoom(this)">Remove</button>
    `;

    container.appendChild(block);
  }

  function removeRoom(button) {
    button.parentElement.remove();
  }
</script>
