<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Register as Landlord</title>
</head>
<body>

  <header>
    <div>STAY HUB</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="login.php">Login</a>
    </nav>
  </header>

  <main>
    <h2>Landlord Registration</h2>

    <form action="register.php" method="post" id="register-form" novalidate>
      <input type="hidden" name="role" value="admin">

      <div>
        <label for="id_num">ID Number</label>
        <input type="text" id="id_num" name="id_num" required />
      </div>

      <div>
        <label for="first_name">First Name</label>
        <input type="text" id="first_name" name="first_name" required />
      </div>

      <div>
        <label for="last_name">Last Name</label>
        <input type="text" id="last_name" name="last_name" required />
      </div>

      <div>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required />
      </div>

      <div>
        <label for="cell_number">Cell Number</label>
        <input type="tel" id="cell_number" name="cell_number" required />
      </div>

      <div>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required />
      </div>

      <button type="submit">Register as Landlord</button>
    </form>
  </main>

  <footer>
    <p>© 2025 STAY HUB. All rights reserved.</p>
  </footer>

</body>
</html>
